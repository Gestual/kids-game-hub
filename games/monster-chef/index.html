<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Potion Maker - Kids Game Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Fredoka:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../styles/hub-theme.css">
    <link rel="stylesheet" href="style.css?v=1">
</head>

<body>
    <div id="game-container">
        <!-- Background Layer -->
        <div id="background-layer"></div>

        <!-- Headers & Navigation -->
        <button class="hub-back-btn" onclick="HubAPI.close()">← BACK</button>
        <div id="level-indicator">LEVEL: <span id="current-level">1</span></div>

        <!-- Fairy/Witch Character -->
        <div id="potion-maker">
            <div id="speech-bubble" class="hidden">
                <p id="speech-text">I NEED 2 APPLES.</p>
            </div>
            <!-- Recipe Progress UI -->
            <div id="recipe-tracker" class="hidden"></div>
        </div>

        <!-- Foreground Counter -->
        <div id="counter-layer"></div>

        <!-- Pantry Area (Replaces Fridge/Conveyor) -->
        <div id="pantry-area">
            <div class="pantry-grid" id="pantry-grid">
                <!-- Draggable ingredients go here -->
            </div>
        </div>

        <!-- Cauldron Drop Zone -->
        <div id="drop-zone" class="cauldron-zone"></div>

        <!-- Overlay Feedback -->
        <div id="feedback-overlay" class="hidden">
            <h1 id="feedback-text">YUMMY!</h1>
        </div>
    </div>

    <!-- Hub API integration -->
    <script>
        const HubAPI = {
            addXP(amount) {
                if (window.parent && window.parent.Hub) {
                    window.parent.postMessage({ type: 'addXP', amount: amount }, '*');
                }
            },
            close() {
                if (window.parent && window.parent.Hub) {
                    window.parent.postMessage({ type: 'closeGame' }, '*');
                } else {
                    console.log("Close game requested");
                }
            }
        };
    </script>
    <script src="game.js?v=1"></script>
</body>

</html>
