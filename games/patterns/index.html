<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <title>Pattern Master Kids</title>
    <style>
        :root {
            --primary: #ffffff;
            --accent: #FFD93D;
            --accent-secondary: #6BCB77;
            --accent-tertiary: #4D96FF;
            --danger: #FF6B6B;
            --pink: #FF92AD;
            --text-dark: #2F3E46;
            --shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: transparent;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #ui-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 2.5rem;
            color: white;
            text-shadow: 3px 3px 0 var(--text-dark);
            margin: 10px 0;
        }

        p {
            color: white;
            font-weight: 900;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        #sequence-container {
            display: flex;
            gap: 12px;
            margin: 30px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        .item {
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: white;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .item.empty {
            border: 3px dashed var(--accent);
            background: none;
            color: white;
            font-weight: 900;
        }

        #options-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .option {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #ddd;
        }

        .option:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #hud {
            margin-top: 30px;
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.5rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <div id="ui-container">
        <h1 id="title">Pattern Master</h1>
        <p>What comes next?</p>
        <div id="sequence-container"></div>
        <div id="options-container"></div>
        <div id="hud"><span id="score-label">Score: </span><span id="score">0</span></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let lang = urlParams.get('lang');
        if (!lang && window.parent && window.parent.Hub) {
            lang = window.parent.Hub.state.lang;
        }
        lang = lang || 'en';

        const difficulty = urlParams.get('diff') || 'easy';

        const translations = {
            en: {
                title: "Patterns",
                win: "Pattern Master! You're super smart! 🌈✨",
                wrong: "Almost! Look closely and try again!",
                score: "Score: "
            },
            fr: {
                title: "Suites Logiques",
                win: "Maître des suites ! Tu es super intelligent ! 🌈✨",
                wrong: "Presque ! Regarde bien et réessaie !",
                score: "Score : "
            },
            es: {
                title: "Patrones",
                win: "¡Maestro de los patrones! ¡Eres súper listo! 🌈✨",
                wrong: "¡Casi! ¡Mira bien e inténtalo de nuevo!",
                score: "Puntos: "
            }
        };
        const t = translations[lang] || translations.en;

        const config = {
            easy: { length: 3, types: ['ABAB'] },
            medium: { length: 5, types: ['ABAB', 'AABB', 'ABCABC'] },
            hard: { length: 7, types: ['ABAB', 'AABB', 'ABCABC', 'AABBAA'] }
        }[difficulty];

        const symbols = ['🍎', '🍌', '🍇', '🍓', '🍒', '🍉', '🍍', '🥝', '🦁', '🐯', '🦒', '🐘'];
        let score = 0;
        let solution = '';

        function generatePattern() {
            const types = config.types;
            const type = types[Math.floor(Math.random() * types.length)];
            const s1 = symbols[Math.floor(Math.random() * symbols.length)];
            let s2 = symbols[Math.floor(Math.random() * symbols.length)];
            while (s2 === s1) s2 = symbols[Math.floor(Math.random() * symbols.length)];
            let s3 = symbols[Math.floor(Math.random() * symbols.length)];
            while (s3 === s1 || s3 === s2) s3 = symbols[Math.floor(Math.random() * symbols.length)];

            let pattern = [];
            if (type === 'ABAB') {
                pattern = Array(config.length).fill().map((_, i) => i % 2 === 0 ? s1 : s2);
                solution = pattern.length % 2 === 0 ? s1 : s2;
            } else if (type === 'AABB') {
                pattern = Array(config.length).fill().map((_, i) => Math.floor(i / 2) % 2 === 0 ? s1 : s2);
                solution = (Math.floor(pattern.length / 2) % 2 === 0) ? s1 : s2; // Simplified
                // Correct AABB logic for variable length
                solution = pattern[pattern.length - 2]; // Just for example, let's fix
                let full = [s1, s1, s2, s2, s1, s1, s2, s2];
                pattern = full.slice(0, config.length);
                solution = full[config.length];
            } else if (type === 'ABCABC') {
                let full = [s1, s2, s3, s1, s2, s3, s1, s2, s3];
                pattern = full.slice(0, config.length);
                solution = full[config.length];
            } else {
                let full = [s1, s1, s2, s2, s1, s1, s2, s2];
                pattern = full.slice(0, config.length);
                solution = full[config.length];
            }

            renderSequence(pattern);
            renderOptions(solution);
        }

        function renderSequence(pattern) {
            const container = document.getElementById('sequence-container');
            container.innerHTML = '';
            pattern.forEach(sym => {
                const el = document.createElement('div');
                el.className = 'item';
                el.textContent = sym;
                container.appendChild(el);
            });
            const empty = document.createElement('div');
            empty.className = 'item empty';
            empty.textContent = '?';
            container.appendChild(empty);
        }

        function renderOptions(correct) {
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            const opts = [correct];
            while (opts.length < 3) {
                const wrong = symbols[Math.floor(Math.random() * symbols.length)];
                if (!opts.includes(wrong)) opts.push(wrong);
            }
            opts.sort(() => Math.random() - 0.5);

            opts.forEach(opt => {
                const el = document.createElement('div');
                el.className = 'option';
                el.textContent = opt;
                el.onclick = () => checkAnswer(opt === correct);
                container.appendChild(el);
            });
        }

        function checkAnswer(isCorrect) {
            if (isCorrect) {
                score++;
                document.getElementById('score').textContent = score;
                if (window.parent && window.parent.Hub) window.parent.Hub.addXP(40);

                if (score >= (difficulty === 'easy' ? 3 : 5)) {
                    setTimeout(() => {
                        alert(t.win);
                        if (window.parent && window.parent.Hub) {
                            window.parent.Hub.addXP(200);
                            window.parent.Hub.closeGame();
                        }
                    }, 500);
                } else {
                    generatePattern();
                }
            } else {
                alert(t.wrong);
            }
        }

        document.getElementById('title').textContent = t.title;
        document.getElementById('score-label').firstChild.textContent = t.score;
        generatePattern();
    </script>
</body>

</html>
</script>
</body>

</html>
